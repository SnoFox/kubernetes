apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  namespace: argocd
  name: cobblexcreate
  labels:
    snofox.net/catagory: fun
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: cobblexcreate
  sources:
    - repoURL: https://itzg.github.io/minecraft-server-charts/
      chart: cobblexcreate
      targetRevision: 5.1.3
      helm:
        valueFiles:
        - $values/values/cobblexcreate.yml
    - repoURL: https://gitlab.com/SnoFox/kubernetes.git
      targetRevision: master
      ref: values
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
