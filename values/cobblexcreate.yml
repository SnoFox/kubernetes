image:
  tag: java21

resources:
  requests:
    memory: 16Gi
    cpu: 3000m

lifecycle:
  postStart: []
  preStop: []

workloadAsStatefulSet: true

# upgrade strategy type, depending on workload type:
# - for Deployment sets strategy: Recreate or RollingUpdate
# - for StatefulSet sets updateStrategy: OnDelete or RollingUpdate
strategyType: OnDelete

revisionHistoryLimit: 5

# Most of these map to environment variables. See Minecraft for details:
# https://hub.docker.com/r/itzg/minecraft-server/
livenessProbe:
  command:
    - mc-health
  initialDelaySeconds: 300
  periodSeconds: 5
  failureThreshold: 20
  successThreshold: 1
  timeoutSeconds: 1
readinessProbe:
  command:
    - mc-health
  initialDelaySeconds: 300
  periodSeconds: 5
  failureThreshold: 20
  successThreshold: 1
  timeoutSeconds: 1
startupProbe:
  command:
    - mc-health
  enabled: false
  failureThreshold: 30
  periodSeconds: 10

extraDeploy:
  - |
    apiVersion: onepassword.com/v1
    kind: OnePasswordItem
    metadata:
      name: rcon
      namespace: cobblexcreate
    spec:
      itemPath: "vaults/FMT/items/cobblexcreate:rcon"

extraEnv:
  MODPACK_PLATFORM: MODRINTH
  MODRINTH_MODPACK: cobblemon-x-creating
  MODRINTH_FORCE_SYNCHRONIZE: "true"
  MODRINTH_EXCLUDE_FILES: |
    reforgedplaymod
    better-clouds
    betterclouds
    dynamic-fps
    mcmouser
    forgematica
    ctrlq
    particular
    distanthorizons
    DistantHorizons
    fusion
    athena
  MODRINTH_OVERRIDES_EXCLUSIONS: |
    mods/reforgedplaymod-*.jar
    mods/better-clouds-*.jar
    mods/betterclouds-*.jar
    mods/dynamic-fps-*.jar
    mods/mcmouser-*.jar
    mods/forgematica-*.jar
    mods/ctrlq-*.jar
    mods/particular-*.jar
    mods/DistantHorizons-*.jar
    mods/distanthorizons-*.jar
    mods/fusion-*.jar
    mods/athena-*.jar
    mods/Xaero*.jar
    mods/xaerolib-*.jar

minecraftServer:
  eula: "TRUE"
  # One of: LATEST, SNAPSHOT, or a specific version (ie: "1.7.9").
  version: "1.21.1"
  ## The type of Minecraft server to run, check for related settings below
  ## Common types: "VANILLA", "FABRIC", "FORGE", "SPIGOT", "BUKKIT", "PAPER",
  ## "FTBA", "SPONGEVANILLA", "AUTO_CURSEFORGE"
  ## ref: https://docker-minecraft-server.readthedocs.io/en/latest/types-and-platforms
  type: "MODRINTH"
  # One of: peaceful, easy, normal, and hard
  difficulty: normal
  # A comma-separated list of player names to whitelist.
  whitelist:
  # A comma-separated list of player names who should be admins.
  ops: SnoFox
  # A server icon URL for server listings. Auto-scaled and transcoded.
  icon:
  maxPlayers: default
  maxWorldSize: default
  allowNether: true
  announcePlayerAchievements: true
  enableCommandBlock: true
  forcegameMode: false
  generateStructures: true
  hardcore: false
  maxBuildHeight: default
  maxTickTime: default
  spawnAnimals: true
  spawnMonsters: true
  spawnNPCs: true
  spawnProtection: -1
  # Max view distance (in chunks).
  viewDistance: default
  levelSeed:
  gameMode: survival
  motd: "I wanna be the very best"
  # If true, enable player-vs-player damage.
  pvp: true
  # One of: DEFAULT, FLAT, LARGEBIOMES, AMPLIFIED, CUSTOMIZED
  levelType: DEFAULT
  worldSaveName: world
  # If true, old versions of downloaded mods will be replaced with new ones from downloadModpackUrl
  removeOldMods: false
  # A list of VanillaTweaks Share Codes to download. (https://vanillatweaks.net/share#wUq1iz => "wUq1iz")
  vanillaTweaksShareCodes: []
  resourcePackEnforce: false
  onlineMode: true
  enforceSecureProfile: true
  memory: 16G
  # General JVM options to be passed to the Minecraft server invocation
  jvmOpts: ""
  jvmXXOpts: >-
    -XX:+UseG1GC
    -XX:+ParallelRefProcEnabled
    -XX:MaxGCPauseMillis=200
    -XX:+UnlockExperimentalVMOptions
    -XX:+DisableExplicitGC
    -XX:G1NewSizePercent=30
    -XX:G1MaxNewSizePercent=40
    -XX:G1HeapRegionSize=8M
    -XX:G1ReservePercent=20
    -XX:G1HeapWastePercent=5
    -XX:G1MixedGCCountTarget=4
    -XX:InitiatingHeapOccupancyPercent=15
    -XX:G1MixedGCLiveThresholdPercent=90
    -XX:G1RSetUpdatingPauseTimePercent=5
    -XX:SurvivorRatio=32
    -XX:+PerfDisableSharedMem
    -XX:MaxTenuringThreshold=1
    -XX:+PrintCommandLineFlags
    -XX:NativeMemoryTracking=summary
    -Xlog:gc*::time,uptime,level,tags

  overrideServerProperties: default
  # DEPRECATED: use top-level rconServiceAnnotations instead
  serviceType: ClusterIP
  ## Set the port used if the serviceType is NodePort
  nodePort:
  servicePort: 25565
  clusterIP:
  loadBalancerClass: tailscale
  loadBalancerIP:
  # externalTrafficPolicy: Cluster
  externalIPs:
  ipFamilies:
  ipFamilyPolicy:

  # Additional service specs to be defined
  extraServiceSpec: {}

  # A list of Modrinth project slugs with optional version after colon
  modrinth:
    projects: []
    # Specifies whether to download Modrinth dependencies. The allowed values are: none, required, optional
    downloadDependencies: required
    # The version type is used to determine the newest version to use from each project. The allowed values are: release, beta, alpha
    allowedVersionType: release


  rcon:
    enabled: true
    withGeneratedPassword: false
    port: 25575
    existingSecret: "rcon"
    secretKey: password
    serviceType: ClusterIP
    ## Set the external port if the rcon serviceType is NodePort
    nodePort:
    clusterIP:
    loadBalancerClass:
    loadBalancerIP:
    # loadBalancerSourceRanges: []
    ## Set the externalTrafficPolicy in the Service to either Cluster or Local
    # externalTrafficPolicy: Cluster

  ## set this to false to not have colorized logs
  tty: true

  extraPorts:
    []
    # These options allow you to expose another port from the Minecraft server, plugins such
    # as dynmap (8123) and bluemap (8100) will require this for access to their web interfaces
    #
    # - name: map
    #   containerPort: 8123
    #   protocol: TCP
    #   service:
    #     enabled: false
    #     embedded: false
    #     annotations: {}
    #     type: ClusterIP
    #     ## Set the external port if the rcon serviceType is NodePort
    ##     nodePort:
    #     loadBalancerIP: ""
    #     loadBalancerSourceRanges: []
    #     externalTrafficPolicy: Cluster
    #     port: 8123
    #   ingress:
    #     ingressClassName: nginx
    #     enabled: false
    #     annotations:
    ## Deprecated way for specifying the ingressClass. Kube.version < 1.18
    ##       kubernetes.io/ingress.class: nginx
    #       kubernetes.io/tls-acme: "true"
    #     hosts:
    #       - name: map.local
    #         path: /
    #     tls:
    #       - secretName: map-tls
    #         hosts:
    #           - map.local

  query:
    # If you enable this, your server will be "published" to Gamespy
    enabled: false
    port: 25565

## Additional environment variables to add to the minecraft container from
## ConfigMaps and Secrets
##
envFrom: []

persistence:
  labels: {}
  annotations: {}
  ## specify an alternative volume to be mounted to /data instead of datadir.
  # altDataVolumeName: ""
  ## minecraft data Persistent Volume Storage Class
  ## If defined, storageClassName: <storageClass>
  ## If set to "-", storageClassName: "", which disables dynamic provisioning
  ## If undefined (the default) or set to null, no storageClassName spec is
  ##   set, choosing the default provisioner.  (gp2 on AWS, standard on
  ##   GKE, AWS & OpenStack)
  ##
  storageClass: "freenas-iscsi-csi"
  dataDir:
    # Set this to false if you don't care to persist state between restarts.
    enabled: true
    Size: 10Gi
    accessModes:
      - ReadWriteOnce
    subPath: data
  #extraVolumes:
  #  - volumeMounts:
  #      - name: datadir
  #        mountPath: 
  #        subPath:

podAnnotations: {}
podLabels: {}

deploymentAnnotations: {}
deploymentLabels: {}

serviceAnnotations:
  tailscale.com/hostname: cobble
  tailscale.com/expose: "true"
serviceLabels: {}

rconServiceAnnotations: {}
rconServiceLabels: {}

mcbackup:
  enabled: false
